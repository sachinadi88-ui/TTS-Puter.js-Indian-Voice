<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced AI Text to Speech</title>

<script src="https://js.puter.com/v2/"></script>

<style>

body{
font-family:Segoe UI,Roboto,sans-serif;
background:#f2f4f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.1);
width:400px;
text-align:center;
}

h1{
margin-top:0;
color:#333;
}

textarea{
width:100%;
height:120px;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
resize:none;
font-size:16px;
margin-bottom:15px;
}

select{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:20px;
font-size:15px;
}

.button-group{
display:flex;
gap:10px;
}

button{
flex:1;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
color:white;
cursor:pointer;
}

#speak{
background:#007bff;
}

#speak:hover{
background:#0056b3;
}

#download{
background:#28a745;
}

#download:hover{
background:#1f7d34;
}

#download:disabled{
background:#94d3a2;
cursor:not-allowed;
}

#status{
margin-top:15px;
font-size:14px;
color:#666;
min-height:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>AI Text To Speech</h1>

<textarea id="textInput" placeholder="Type something to convert into speech..."></textarea>

<select id="voiceSelect">

<optgroup label="US Voices">
<option value="Joanna">Joanna (Female)</option>
<option value="Matthew">Matthew (Male)</option>
<option value="Joey">Joey (Male)</option>
<option value="Kimberly">Kimberly (Female)</option>
<option value="Salli">Salli (Female)</option>
<option value="Kendra">Kendra (Female)</option>
<option value="Ivy">Ivy (Child)</option>
<option value="Justin">Justin (Child)</option>
</optgroup>

<optgroup label="British Voices">
<option value="Amy">Amy (UK Female)</option>
<option value="Emma">Emma (UK Female)</option>
<option value="Brian">Brian (UK Male)</option>
</optgroup>

<optgroup label="Australian Voices">
<option value="Nicole">Nicole (Australian Female)</option>
<option value="Russell">Russell (Australian Male)</option>
</optgroup>

<optgroup label="Indian Voices">
<option value="Aditi">Aditi (Indian Female)</option>
<option value="Raveena">Raveena (Indian Female)</option>
</optgroup>

</select>

<div class="button-group">
<button id="speak">Speak</button>
<button id="download" disabled>Download</button>
</div>

<div id="status"></div>

</div>

<script>

const speakBtn=document.getElementById("speak");
const downloadBtn=document.getElementById("download");
const textInput=document.getElementById("textInput");
const voiceSelect=document.getElementById("voiceSelect");
const status=document.getElementById("status");

let currentAudio=null;

speakBtn.addEventListener("click",async()=>{

const text=textInput.value.trim();
const voice=voiceSelect.value;

if(!text){
status.innerText="Please enter text first.";
status.style.color="red";
return;
}

status.innerText="Generating AI speech...";
status.style.color="#444";

speakBtn.disabled=true;
downloadBtn.disabled=true;

try{

currentAudio=await puter.ai.txt2speech(text,{
voice:voice,
engine:"neural"
});

currentAudio.play();

status.innerText="Playing audio...";
status.style.color="green";

downloadBtn.disabled=false;

currentAudio.onended=()=>{
status.innerText="Finished playing. Ready to download.";
status.style.color="#555";
}

}
catch(error){

console.error(error);
status.innerText="Error generating speech.";
status.style.color="red";

}

finally{

speakBtn.disabled=false;

}

});

downloadBtn.addEventListener("click",()=>{

if(currentAudio && currentAudio.src){

const link=document.createElement("a");

link.href=currentAudio.src;
link.download="ai-generated-speech.mp3";

document.body.appendChild(link);

link.click();

document.body.removeChild(link);

}

});

</script>

</body>
</html>
