<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indian AI Text to Speech</title>

<script src="https://js.puter.com/v2/"></script>

<style>

body{
font-family:Arial, sans-serif;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:25px;
border-radius:10px;
width:400px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
}

textarea{
width:100%;
height:110px;
padding:10px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
resize:none;
}

select{
width:100%;
padding:10px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
}

.buttons{
display:flex;
gap:10px;
}

button{
flex:1;
padding:10px;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

#speak{
background:#007bff;
}

#download{
background:#28a745;
}

#download:disabled{
background:#94d3a2;
cursor:not-allowed;
}

#status{
margin-top:15px;
font-size:14px;
color:#666;
}

</style>
</head>

<body>

<div class="container">

<h2>Indian AI Text to Speech</h2>

<textarea id="textInput" placeholder="Type text here..."></textarea>

<select id="voiceSelect">

<option value="Aditi">Aditi (Indian Female)</option>
<option value="Raveena">Raveena (Indian Female)</option>
<option value="Arjun">Arjun (Indian Male)</option>

</select>

<div class="buttons">
<button id="speak">Speak</button>
<button id="download" disabled>Download</button>
</div>

<div id="status"></div>

</div>

<script>

const speak=document.getElementById("speak");
const download=document.getElementById("download");
const textInput=document.getElementById("textInput");
const voiceSelect=document.getElementById("voiceSelect");
const status=document.getElementById("status");

let currentAudio=null;

speak.addEventListener("click",async()=>{

const text=textInput.value.trim();

if(!text){
status.innerText="Please enter some text.";
return;
}

status.innerText="Generating speech...";
speak.disabled=true;

try{

currentAudio=await puter.ai.txt2speech(text,{
voice:voiceSelect.value
});

currentAudio.play();

status.innerText="Playing audio...";
download.disabled=false;

}catch(err){

console.error(err);
status.innerText="Error generating speech.";

}

speak.disabled=false;

});

download.addEventListener("click",()=>{

if(currentAudio){

const link=document.createElement("a");
link.href=currentAudio.src;
link.download="indian-speech.mp3";

document.body.appendChild(link);
link.click();
document.body.removeChild(link);

}

});

</script>

</body>
</html>
